<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሴኒያ የንግድ መመዝገቢያ</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
    <div id="root"></div>
    <script type="text/babel">
        // እዚህ ጋር በፎቶው ላይ ያየኸውን የReact ኮድ በሙሉ አስገባው
        const App = () => {
            return (
                <div class="p-5 text-center">
                    <h1 class="text-2xl text-orange-500 font-bold">ሴኒያ ቢዝነስ</h1>
                    <p class="mt-4">የሸክላ እና የሰፌድ ሽያጭ መመዝገቢያ አፕሊኬሽን</p>
                    <div class="mt-10 bg-gray-800 p-6 rounded-lg">
                        <p>አፑን አሁን መጠቀም ትችላለህ!</p>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
